# Controller Manager Configuration for Inspire RH56 Hand
# This file configures the controller manager and default controllers

controller_manager:
  ros__parameters:
    # Update rate for the controller manager
    # Conservative rate for 115200 bps serial communication
    update_rate: 50  # Hz (20ms cycle time)

    # Available controller types
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    inspire_hand_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    inspire_hand_position_controller:
      type: position_controllers/JointGroupPositionController
