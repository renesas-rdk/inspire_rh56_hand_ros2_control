# Controller Manager Configuration for Inspire RH56 Hand
# This file configures the controller manager and default controllers

controller_manager:
  ros__parameters:
    # Update rate for the controller manager
    # Conservative rate for 115200 bps serial communication
    update_rate: 50  # Hz (20ms cycle time)

    # Turn on clamping
    enforce_command_limits: true

    # Available controller types
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    inspire_rh56_hand_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    inspire_rh56_hand_joint_position_controller:
      type: position_controllers/JointGroupPositionController

joint_state_broadcaster:
  ros__parameters:
    use_urdf_to_filter: false
    joints:
      - thumb_proximal_yaw_joint
      - thumb_proximal_pitch_joint
      - index_proximal_joint
      - middle_proximal_joint
      - ring_proximal_joint
      - pinky_proximal_joint
    interfaces: [position, velocity]
